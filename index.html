<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oranjegloed – LED Smart Shirt | WK 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Barlow',sans-serif;overflow-x:hidden}

/* VLAG */
.vlag{height:7px;background:linear-gradient(90deg,#AE1C28 33%,#fff 33%,#fff 66%,#21468B 66%)}

/* HEADER */
.header{background:#0a0a0a;padding:18px 20px;text-align:center;border-bottom:1px solid #1a1a1a}
.header-naam{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:6px;color:#FF6B00;text-shadow:0 0 20px rgba(255,107,0,0.6)}
.header-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:2px}

/* TICKER */
.ticker{background:#FF6B00;overflow:hidden;white-space:nowrap;padding:9px 0}
.ticker-inner{display:inline-block;animation:tick 16s linear infinite;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:4px;color:#fff;padding-left:100%}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* HERO */
.hero{position:relative;overflow:hidden}
.hero img{width:100%;display:block;object-fit:cover;max-height:70vh}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05) 40%,rgba(10,10,10,0.95) 100%)}
.hero-txt{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);text-align:center;width:100%;padding:0 20px}
.hero-txt h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,11vw,100px);line-height:0.85;color:#FF6B00;letter-spacing:4px;animation:glow 2.5s ease-in-out infinite}
.hero-txt h2{font-family:'Barlow Condensed',sans-serif;font-size:clamp(13px,2.8vw,22px);font-weight:700;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.8);margin-top:8px}
@keyframes glow{0%,100%{text-shadow:0 0 30px rgba(255,107,0,0.7)}50%{text-shadow:0 0 70px rgba(255,107,0,1),0 0 120px rgba(255,200,0,0.4)}}

/* MUZIEK */
.muziek{background:#111;border-top:3px solid #FF6B00;border-bottom:3px solid #FF6B00;padding:18px 20px;text-align:center}
.muziek-btn{background:linear-gradient(90deg,#FF6B00,#FFD700);border:none;border-radius:50px;padding:16px 40px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:3px;text-transform:uppercase;color:#000;cursor:pointer;width:100%;max-width:400px;animation:pulse-btn 1.8s ease-in-out infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 20px rgba(255,107,0,0.4)}50%{box-shadow:0 0 50px rgba(255,107,0,0.8)}}
.bars{display:flex;gap:3px;justify-content:center;align-items:flex-end;height:20px;margin-top:10px;opacity:0;transition:opacity 0.3s}
.bars.on{opacity:1}
.bar{width:4px;background:#FF6B00;border-radius:2px}
.bar:nth-child(1){animation:b 0.6s ease-in-out infinite alternate}
.bar:nth-child(2){animation:b 0.8s 0.1s ease-in-out infinite alternate}
.bar:nth-child(3){animation:b 0.5s 0.2s ease-in-out infinite alternate}
.bar:nth-child(4){animation:b 0.7s 0.05s ease-in-out infinite alternate}
@keyframes b{0%{height:4px}100%{height:18px}}

/* PRODUCT */
.product{max-width:520px;margin:0 auto;padding:40px 20px 50px}
.badge{display:inline-block;background:#FF6B00;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:5px 14px;border-radius:4px;margin-bottom:16px}
.titel{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,7vw,54px);line-height:1;margin-bottom:14px}
.titel span{color:#FF6B00}
.omschrijving{font-size:15px;color:rgba(255,255,255,0.6);line-height:1.7;margin-bottom:28px}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.feat{background:#141414;border:1px solid rgba(255,107,0,0.2);border-radius:10px;padding:13px;font-size:13px;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:8px}
.prijs-rij{display:flex;align-items:baseline;gap:12px;margin-bottom:24px}
.prijs{font-family:'Bebas Neue',sans-serif;font-size:58px;color:#FF6B00;line-height:1}
.prijs-note{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35)}
.maat-label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#FF6B00;margin-bottom:10px}
select{width:100%;padding:15px;background:#1a1a1a;color:#fff;border:2px solid rgba(255,107,0,0.4);border-radius:8px;font-size:16px;outline:none;margin-bottom:20px;font-family:'Barlow',sans-serif}
select:focus{border-color:#FF6B00}
.bestel-btn{display:block;width:100%;padding:18px;background:linear-gradient(90deg,#FFD700,#FF6B00);color:#000;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:none;text-align:center;cursor:pointer;margin-bottom:14px;transition:transform 0.2s;box-shadow:0 0 30px rgba(255,165,0,0.3)}
.bestel-btn:hover{transform:scale(1.02)}
.trust{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.trust span{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.35)}

/* AFTELLER */
.afteller{background:#0a0a0a;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;padding:44px 20px;text-align:center}
.afteller-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:#FF6B00;margin-bottom:6px}
.afteller-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:28px}
.teller-rij{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap}
.teller-blok{text-align:center}
.teller-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(50px,13vw,82px);color:#FF6B00;background:#141414;border:2px solid rgba(255,107,0,0.3);border-radius:10px;padding:10px 14px;min-width:72px;line-height:1;text-shadow:0 0 15px rgba(255,107,0,0.5)}
.teller-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:8px}
.teller-sep{font-family:'Bebas Neue',sans-serif;font-size:60px;color:rgba(255,107,0,0.4);padding-bottom:22px}

/* FOOTER */
footer{background:#080808;border-top:1px solid #1a1a1a;padding:28px 20px;text-align:center}
.footer-naam{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#FF6B00;letter-spacing:5px;margin-bottom:6px}
.footer-sub{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:2px;text-transform:uppercase}

/* CONFETTI */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}
</style>
</head>
