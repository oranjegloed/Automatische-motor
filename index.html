<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oranjegloed | Links</title>
    <style>
        :root { --primary: #ff6a00; --bg: #121212; --card: #1e1e1e; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        .profile-title { 
            font-size: 28px; 
            font-weight: bold; 
            color: var(--primary); 
            margin: 30px 0; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links-wrapper { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .btn { 
            display: block; 
            background-color: var(--card); 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            font-weight: 600; 
            transition: all 0.3s ease; 
        }

        .btn:hover { 
            border-color: var(--primary); 
            background-color: #2a2a2a; 
        }

        /* De PayPal knop springt eruit */
        .btn-paypal { 
            background: linear-gradient(90deg, #ff6a00, #ff8c00); 
            color: black; 
            border: none; 
            font-size: 18px;
            text-transform: uppercase;
        }

        .btn-paypal:hover { 
            transform: scale(1.02); 
            background: #ff8c00; 
        }

        footer { 
            margin-top: 40px; 
            color: #666; 
            font-size: 12px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-title">ORANJEGLOED</div>
    
    <div class="links-wrapper">
        <a href="https://www.paypal.com/ncp/payment/F43E49NG4RML2" class="btn btn-paypal">
            Bestel de Tech-Polo
        </a>

        <a href="#" class="btn">Project informatie</a>
        <a href="#" class="btn">Maattabel</a>
        <a href="#" class="btn">Contact opnemen</a>
        <a href="#" class="btn">Volg ons op Instagram</a>
    </div>

    <footer>
        &copy; 2026 Oranjegloed Tech-Wear
    </footer>
</div>

</body>
</html>
